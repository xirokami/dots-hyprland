env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

general {
  gaps_in = 5
  gaps_out = 10

  border_size = 2

  col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
  col.inactive_border = rgba(595959aa)

  resize_on_border = false

  allow_tearing = false

  layout = dwindle
}
gestures {
    workspace_swipe_distance = 1200
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}
decoration {
  rounding = 10
  rounding_power = 2
  
  active_opacity = 1.0
  inactive_opacity = 1.0

  shadow {
    enabled = true
    range = 10
    render_power = 3
    color = rgba(1a1a1aee)
}

  blur {
    enabled = true
    size = 3
    passes = 2

    vibrancy = 1
  }
}

animations {
  enabled = yes, please :)

  #        NAME,                     X0,   Y0,   X1,   Y1
  bezier = easeOutQuint,             0.23, 1,    0.32, 1
  bezier = easeInOutCubic,           0.65, 0.05, 0.36, 1
  bezier = linear,                   0,    0,    1,    1
  bezier = almostLinear,             0.5,  0.5,  0.75, 1
  bezier = quick,                    0.15, 0,    0.1,  1
  bezier = expressiveFastSpatial,    0.42, 1.67, 0.21, 0.90
  bezier = expressiveSlowSpatial,    0.39, 1.29, 0.35, 0.98
  bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
  bezier = emphasizedDecel,          0.05, 0.7, 0.1, 1
  bezier = emphasizedAccel,          0.3, 0, 0.8, 0.15
  bezier = standardDecel,            0, 0, 0, 1
  bezier = menu_decel,               0.1, 1, 0, 1
  bezier = menu_accel,               0.52, 0.03, 0.72, 0.08
  bezier = stall,                    1, -0.1, 0.7, 0.85

  #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
  animation = global,        1,     10,    default
  animation = border,        1,     5.39,  easeOutQuint
  animation = windows,       1,     4.79,  easeOutQuint
  animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
  animation = windowsOut,    1,     1.49,  linear,       popin 87%
  animation = fadeIn,        1,     1.73,  almostLinear
  animation = fadeOut,       1,     1.46,  almostLinear
  animation = fade,          1,     3.03,  quick
  animation = layers,        1,     3.81,  easeOutQuint
  animation = layersIn,      1,     4,     easeOutQuint, fade
  animation = layersOut,     1,     1.5,   linear,       fade
  animation = fadeLayersIn,  1,     1.79,  almostLinear
  animation = fadeLayersOut, 1,     1.39,  almostLinear
  animation = workspaces,    1,     2.5,   easeInOutCubic
  #animation = workspacesIn, 1,    1.71,  default, fade
  #animation = workspacesOut,1,    1.94,  default, fade
  animation = zoomFactor,    1,    7,     quick
  animation = specialWorkspaceIn, 1, 3, emphasizedDecel, slidevert
  animation = specialWorkspaceOut, 1, 2, emphasizedAccel, slidevert
}

dwindle {
  pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
  preserve_split = true # You probably want this
}

master {
  new_status = master
}

misc {
  force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
  disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
  kb_layout = us,ru
  kb_variant =
  kb_model =
  kb_options = grp:caps_toggle
  kb_rules =

  follow_mouse = 1

  sensitivity = -0.5 # -1.0 - 1.0, 0 means no modification.
  touchpad {
    disable_while_typing = no
    scroll_factor = 0.2
    natural_scroll = true
  }
}
